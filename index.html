<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loky-Craft-Panel</title>
<style>
  :root { --bg: #111827; --card: #1F2937; --text: #FFFFFF; --primary: #10B981; --sub: #9CA3AF; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
  body { background: var(--bg); color: var(--text); padding: 20px; }
.login { max-width: 400px; margin: 50px auto; background: var(--card); padding: 30px; border-radius: 16px; text-align: center; }
.login h1 { color: var(--primary); margin-bottom: 10px; }
.login p { color: var(--sub); margin-bottom: 20px; }
  input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--sub); color: var(--text); border-radius: 8px; }
  input[type="file"] { padding: 8px; }
  button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 10px 0; }
  button:disabled { background: var(--sub); cursor: not-allowed; }
.panel { display: none; max-width: 800px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.add-btn { width: auto; padding: 10px 20px; font-size: 24px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: var(--card); width: 90%; max-width: 500px; padding: 20px; border-radius: 16px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 20px; margin-bottom: 15px; }
  label { display: block; margin-top: 12px; font-size: 14px; color: var(--sub); }
.mod-list { margin-top: 20px; }
.mod-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.btn-group { display: flex; gap: 8px; }
.edit-btn { background: #F59E0B; width: auto; padding: 8px 12px; }
.delete-btn { background: #EF4444; width: auto; padding: 8px 12px; }
.info { font-size: 12px; color: var(--sub); margin-top: 10px; text-align: center; }
.preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin: 8px 0; display: none; }
.tabs { display: flex; gap: 8px; margin: 8px 0; }
.tab { flex: 1; padding: 8px; background: var(--bg); border: 1px solid var(--sub); color: var(--text); border-radius: 8px; cursor: pointer; text-align: center; }
.tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.warning { background: #F59E0B; color: #111827; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 12px; text-align: center; }
</style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login" id="login">
    <div style="font-size: 40px;">🎮</div>
    <h1>Loky-Craft-Panel</h1>
    <p>Panel de Administración</p>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>

  <!-- PANEL -->
  <div class="panel" id="panel">
    <div class="header">
      <h2>Mis Mods</h2>
      <button class="add-btn" onclick="abrirModal()">+</button>
    </div>
    <div class="mod-list" id="modList"></div>
    <p class="info">✅ Subida automática a Github<br>✅ Sin tarjeta, sin Storage<br>✅ Tu web se actualiza sola en tiempo real</p>
  </div>

  <!-- MODAL AGREGAR/EDITAR -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title" id="modal-title">Agregar Nuevo Mod</div>
      <div class="warning">⚠️ Las fotos se suben automático a Github</div>

      <label>Nombre del mod</label>
      <input type="text" id="nombre" placeholder="Essentials Update V1.6">

      <label>Selecciona categoría</label>
      <select id="categoria">
        <option>ADDONS</option>
        <option>MAPAS</option>
        <option>SHADERS</option>
        <option>TEXTURAS</option>
        <option>DLC</option>
        <option>SKINS</option>
        <option>VERSIONES</option>
      </select>

      <label>Versión</label>
      <input type="text" id="version" placeholder="V1.6">

      <label>Descripción</label>
      <textarea id="desc" rows="3" placeholder="Trae nuevos items útiles y crafteos..."></textarea>

      <label>Link de descarga</label>
      <input type="text" id="link" placeholder="https://mediafire.com/...">

      <label>Imagen del mod</label>
      <div class="tabs">
        <div class="tab active" onclick="cambiarTab('archivo')">📁 Subir a Github</div>
        <div class="tab" onclick="cambiarTab('link')">🔗 Link</div>
      </div>

      <div id="tab-archivo">
        <input type="file" id="imagenArchivo" accept="image/*">
        <img id="preview" class="preview">
      </div>

      <div id="tab-link" style="display:none;">
        <input type="text" id="imagenLink" placeholder="https://raw.githubusercontent.com/...">
      </div>

      <button onclick="guardarMod()" id="btnGuardar">Guardar Mod</button>
      <button style="background: var(--sub);" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, push, onValue, remove, set, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  // ===== CONFIG SIN TOKEN EXPUESTO =====
  let GITHUB_TOKEN = sessionStorage.getItem('loky_github_token');
  
  const GITHUB_REPO = 'calacas-cripto/Loky-Craft-Web';
  const GITHUB_BRANCH = 'main';
  const GITHUB_FOLDER = 'imagenes';

  const firebaseConfig = {
    apiKey: "AIzaSyBXhM5bFmzlVvJ5IZoz7wBiYwK05IGJQdM",
    authDomain: "loky-craft-web.firebaseapp.com",
    databaseURL: "https://loky-craft-web-default-rtdb.firebaseio.com",
    projectId: "loky-craft-web",
    storageBucket: "loky-craft-web.firebasestorage.app",
    messagingSenderId: "928176018138",
    appId: "1:928176018138:web:5bf04e56d029a6b5078be3",
    measurementId: "G-6LB4J9F0CC"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const PASSWORD = "Łºƙị-Č̣ṛąfŧ";
  let tipoImagen = 'archivo';
  let editandoKey = null;

  function pedirToken() {
    GITHUB_TOKEN = prompt('Pega tu Token de Github:\n\nGenera uno en: Settings > Developer settings > Tokens\nSolo marca el permiso "repo"');
    if(GITHUB_TOKEN) {
      sessionStorage.setItem('loky_github_token', GITHUB_TOKEN);
      return true;
    }
    return false;
  }

  window.login = function() {
    if(document.getElementById('pass').value === PASSWORD) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      
      if(!GITHUB_TOKEN) {
        if(!pedirToken()) {
          alert('Ocupas el token pa subir imágenes we');
        }
      }
      cargarMods();
    } else {
      alert('Contraseña incorrecta');
    }
  }

  window.abrirModal = () => {
    editandoKey = null;
    document.getElementById('modal-title').innerText = 'Agregar Nuevo Mod';
    document.getElementById('btnGuardar').innerText = 'Guardar Mod';
    document.getElementById('modal').classList.add('active');
  }

  window.cerrarModal = () => {
    document.getElementById('modal').classList.remove('active');
    limpiarCampos();
  }

  window.cambiarTab = function(tipo) {
    tipoImagen = tipo;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-archivo').style.display = tipo === 'archivo'? 'block' : 'none';
    document.getElementById('tab-link').style.display = tipo === 'link'? 'block' : 'none';
  }

  document.getElementById('imagenArchivo').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('preview').src = e.target.result;
        document.getElementById('preview').style.display = 'block';
      }
      reader.readAsDataURL(file);
    }
  });

  function limpiarCampos() {
    document.getElementById('nombre').value = '';
    document.getElementById('version').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('link').value = '';
    document.getElementById('imagenArchivo').value = '';
    document.getElementById('imagenLink').value = '';
    document.getElementById('preview').style.display = 'none';
    editandoKey = null;
  }

  // SUBIR A GITHUB
  async function subirAGithub(file) {
    if(!GITHUB_TOKEN) {
      if(!pedirToken()) throw new Error('Ocupas poner el token we');
    }

    const nombreArchivo = Date.now() + '-' + file.name.replace(/[^a-zA-Z0-9.]/g, '_');
    const base64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FOLDER}/${nombreArchivo}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Subir imagen ${nombreArchivo}`,
        content: base64,
        branch: GITHUB_BRANCH
      })
    });

    if(res.status === 401) {
      sessionStorage.removeItem('loky_github_token');
      GITHUB_TOKEN = null;
      throw new Error('Token inválido o caducado. Vuelve a intentarlo');
    }
    if(!res.ok) throw new Error('Error al subir a Github');
    const data = await res.json();
    return `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${GITHUB_FOLDER}/${nombreArchivo}`;
  }

  window.guardarMod = async function() {
    const btnGuardar = document.getElementById('btnGuardar');
    btnGuardar.disabled = true;
    btnGuardar.innerText = 'Guardando...';

    const mod = {
      nombre: document.getElementById('nombre').value,
      categoria: document.getElementById('categoria').value,
      version: document.getElementById('version').value,
      desc: document.getElementById('desc').value,
      link: document.getElementById('link').value,
      fecha: Date.now(),
      descargas: 0
    };

    if(!mod.nombre ||!mod.link) {
      alert('Pon mínimo nombre y link de descarga we');
      btnGuardar.disabled = false;
      btnGuardar.innerText = editandoKey? 'Actualizar Mod' : 'Guardar Mod';
      return;
    }

    try {
      if(tipoImagen === 'archivo' && document.getElementById('imagenArchivo').files[0]) {
        btnGuardar.innerText = 'Subiendo a Github...';
        const file = document.getElementById('imagenArchivo').files[0];
        mod.imagen = await subirAGithub(file);
      } else {
        mod.imagen = document.getElementById('imagenLink').value || 'https://via.placeholder.com/300x150/10B981/FFFFFF?text=LOKY';
      }

      if(editandoKey) {
        await set(ref(db, 'mods/' + editandoKey), mod);
        alert('MOD ACTUALIZADO ÉLITE 🔥');
      } else {
        await push(ref(db, 'mods'), mod);
        alert('MOD SUBIDO A GITHUB ÉLITE 🔥💀');
      }
      cerrarModal();
    } catch (error) {
      alert('Error we: ' + error);
    } finally {
      btnGuardar.disabled = false;
      btnGuardar.innerText = 'Guardar Mod';
    }
  }

  function cargarMods() {
    onValue(ref(db, 'mods'), (snapshot) => {
      const lista = document.getElementById('modList');
      lista.innerHTML = '';
      const mods = snapshot.val();
      if(mods) {
        Object.entries(mods).reverse().forEach(([key, mod]) => {
          lista.innerHTML += `
            <div class="mod-item">
              <div>
                <strong>${mod.nombre}</strong><br>
                <small>${mod.categoria} - ${mod.version} | ⬇️ ${mod.descargas || 0}</small>
              </div>
              <div class="btn-group">
                <button class="edit-btn" onclick="editarMod('${key}')">✏️</button>
                <button class="delete-btn" onclick="borrarMod('${key}')">🗑️</button>
              </div>
            </div>
          `;
        });
      } else {
        lista.innerHTML = '<p style="text-align:center;color:var(--sub)">No hay mods aún. Agrega el primero +</p>';
      }
    });
  }

  window.editarMod = async function(key) {
    editandoKey = key;
    const snapshot = await get(ref(db, 'mods/' + key));
    const mod = snapshot.val();

    document.getElementById('nombre').value = mod.nombre;
    document.getElementById('categoria').value = mod.categoria;
    document.getElementById('version').value = mod.version;
    document.getElementById('desc').value = mod.desc;
    document.getElementById('link').value = mod.link;

    if(mod.imagen.startsWith('http')) {
      cambiarTabManual('link');
      document.getElementById('imagenLink').value = mod.imagen;
    } else {
      cambiarTabManual('archivo');
      document.getElementById('preview').src = mod.imagen;
      document.getElementById('preview').style.display = 'block';
    }

    document.getElementById('modal-title').innerText = 'Editar Mod';
    document.getElementById('btnGuardar').innerText = 'Actualizar Mod';
    document.getElementById('modal').classList.add('active');
  }

  function cambiarTabManual(tipo) {
    tipoImagen = tipo;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab:nth-child(${tipo === 'archivo'? 1 : 2})`).classList.add('active');
    document.getElementById('tab-archivo').style.display = tipo === 'archivo'? 'block' : 'none';
    document.getElementById('tab-link').style.display = tipo === 'link'? 'block' : 'none';
  }

  window.borrarMod = function(key) {
    if(confirm('¿Seguro que quieres borrar este mod?')) {
      remove(ref(db, 'mods/' + key));
    }
  }
</script>
</body>
</html>
